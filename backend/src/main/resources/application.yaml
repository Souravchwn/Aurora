spring:
  application:
    name: Aurora
  config:
    # Drop a 'local.properties' file in the backend/ folder to set keys for local dev.
    # It is gitignored — never commit it.
    import: "optional:file:./local.properties"
  
  datasource:
    url: jdbc:h2:mem:aurora
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  cache:
    type: simple

server:
  port: 8080

# Allow frontend dev server and production origins
cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:80}"

news:
  apikeys:
    newsapi: "${NEWSAPI_KEY:72ab7ac2a5ba440ca39b376387aa6797}"
    gnews: "${GNEWS_KEY:fbaef586f0e0c24147666bbe86245786}"
  cache:
    ttl: 3600 # 1 hour in seconds
  scheduler:
    cleanup:
      enabled: true
      cron: "0 0 2 * * ?" # Daily at 2 AM
      retention-days: 7
    refresh:
      enabled: true
      cron: "0 */30 * * * ?" # Every 30 minutes
  providers:
    newsapi:
      enabled: true
      base-url: "https://newsapi.org/v2"
      timeout: 30000
      max-articles: 100
    gnews:
      enabled: true
      base-url: "https://gnews.io/api/v4"
      timeout: 30000
      max-articles: 100

summary:
  ai:
    provider: "openai"
    key: "${OPENAI_KEY:your_openai_key_here}"
    enabled: false # Set to true when you have API key

logging:
  level:
    com.sourav.aurora: INFO
    org.springframework.web: DEBUG
